name: Selenium E2E Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  selenium-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            Pracial1_1/backend/package-lock.json
            Pracial1_1/frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: Pracial1_1/backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: Pracial1_1/frontend
        run: npm ci

      - name: Start backend server
        working-directory: Pracial1_1/backend
        run: |
          node server.js &
          echo "Backend PID: $!"
          for i in $(seq 1 30); do
            if curl -s http://localhost:5000/api/products > /dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            sleep 1
          done

      - name: Start frontend server
        working-directory: Pracial1_1/frontend
        run: |
          npx vite --port 5173 &
          echo "Frontend PID: $!"
          for i in $(seq 1 30); do
            if curl -s http://localhost:5173 > /dev/null 2>&1; then
              echo "Frontend ready"
              break
            fi
            sleep 1
          done

      - name: Run Selenium test
        working-directory: Pracial1_1/backend
        run: npm run selenium
        env:
          CI: true

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-screenshots
          path: |
            **/screenshots/
            **/*.png
          if-no-files-found: ignore
